[tox]
envlist = py,coverage-report,typing,lint,docs,docs-linkcheck
isolated_build = True

[testenv]
description = Run pytest against {envname}.
runner = uv-venv-lock-runner
commands =
    pytest --cov=sasquatch --cov-branch --cov-report={posargs}

[testenv:coverage-report]
description = Compile coverage from each test run.
commands = coverage report
package = skip
depends =
    py

[testenv:lint]
description = Lint codebase by running pre-commit.
commands = pre-commit run --all-files
package = skip
uv_sync_flags = --only-group, lint

[testenv:run]
description = Run the development server with auto-reload for code changes.
usedevelop = true
commands = uvicorn sasquatch.main:app --reload

[testenv:typing]
description = Run mypy.
commands =
    mypy src/sasquatch tests
package = skip
dependency_groups =
    dev
    typing

[testenv:docs]
description = Build documentation (HTML) with Sphinx.
runner = uv-venv-lock-runner
dependency_groups =
    docs
commands =
    sphinx-build --keep-going -n -W -T -b html -d {envtmpdir}/doctrees docs docs/_build/html

[testenv:docs-linkcheck]
description = Check links in the documentation.
runner = uv-venv-lock-runner
dependency_groups =
    docs
commands =
    sphinx-build --keep-going -n -W -T -b linkcheck -d {envtmpdir}/doctrees docs docs/_build/linkcheck
